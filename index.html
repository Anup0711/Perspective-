<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perspective Tool + Background Upload</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* BACKGROUND */
#bgContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

#bgContainer img,
#bgContainer video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* UI */
.wrapper {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.controls {
    text-align: center;
    padding: 10px;
    background: rgba(0,0,0,0.5);
}

.preview-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: translateY(40px);
}

/* Perspective */
.preview {
    perspective: 800px;
}

.rotate-layer {
    display: inline-block;
}

.anim-layer {
    font-size: 60px;
    font-weight: bold;
    white-space: nowrap;
}

/* Animations */
@keyframes slideUp { from {transform:translateY(100px);} to {transform:translateY(0);} }
@keyframes zoomOut { from {transform:scale(2);} to {transform:scale(1);} }
@keyframes spinIn { from {transform:rotate(360deg);} to {transform:rotate(0);} }
@keyframes blurIn { from {filter:blur(10px);} to {filter:blur(0);} }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

.anim-layer span {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
    animation: slideType 0.5s forwards;
}
@keyframes slideType {
    to { opacity:1; transform:translateY(0); }
}

input, select {
    padding: 6px;
    margin: 4px;
    border-radius: 6px;
    border: none;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bgContainer"></div>

<div class="wrapper">

<div class="controls">
    <input id="inputText" value="YOUR TEXT">

    <select id="dir">
        <option value="left">Left</option>
        <option value="right">Right</option>
    </select>

    <input type="range" id="intensity" min="0" max="60" value="25">

    <select id="animation">
        <option value="none">None</option>
        <option value="slideType">Slide To Type</option>
        <option value="slideUp">Slide Up</option>
        <option value="zoomOut">Zoom Out</option>
        <option value="spinIn">Spin In</option>
        <option value="blurIn">Blurry Wipe-In</option>
        <option value="fadeIn">Fade</option>
    </select>

    <input type="range" id="speed" min="0.3" max="3" step="0.1" value="1">

    <!-- Upload -->
    <input type="file" id="bgUpload" accept="image/*,video/*">
</div>

<div class="preview-container">
    <div class="preview">
        <div id="rotate" class="rotate-layer">
            <div id="text" class="anim-layer">YOUR TEXT</div>
        </div>
    </div>
</div>

</div>

<script>
const textEl = document.getElementById("text");
const rotateLayer = document.getElementById("rotate");
const bgContainer = document.getElementById("bgContainer");

/* TEXT + ANIMATION */
function update() {
    const text = document.getElementById("inputText").value;
    const dir = document.getElementById("dir").value;
    const intensity = document.getElementById("intensity").value;
    const animation = document.getElementById("animation").value;
    const speed = document.getElementById("speed").value;

    const rotateY = dir === "left" ? -intensity : intensity;

    rotateLayer.style.transform = `rotateY(${rotateY}deg)`;

    textEl.innerHTML = "";
    textEl.style.animation = "none";

    if (animation === "slideType") {
        text.split("").forEach((char, i) => {
            const span = document.createElement("span");
            span.innerText = char;
            span.style.animationDelay = `${i * 0.05}s`;
            span.style.animationDuration = `${0.4 * speed}s`;
            textEl.appendChild(span);
        });
    } else {
        textEl.innerText = text;

        if (animation !== "none") {
            textEl.style.animation = `${animation} ${speed}s ease forwards`;
        }
    }
}

/* BACKGROUND UPLOAD */
document.getElementById("bgUpload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    bgContainer.innerHTML = "";

    if (file.type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        bgContainer.appendChild(video);
    } else {
        const img = document.createElement("img");
        img.src = url;
        bgContainer.appendChild(img);
    }
});

/* REAL-TIME */
document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", update);
});

update();
</script>

</body>
</html>
